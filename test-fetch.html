<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Fetch Test</title></head>
<body>
<button onclick="test()">テスト</button>
<div id="result" style="margin-top:20px;font-size:14px;"></div>
<script>
var EP='https://asia-northeast1-kensetsu-nippo-842a2.cloudfunctions.net/askAI';
var KEY='HeartsHouse2026Key';
async function test(){
  var el=document.getElementById('result');
  el.textContent='送信中...';
  try{
    var r=await fetch(EP,{
      method:'POST',
      headers:{'Content-Type':'application/json','x-access-key':KEY},
      body:JSON.stringify({model:'gemini-2.5-flash',mode:'normal',prompt:'こんにちは',useSearch:false,useCache:false})
    });
    var d=await r.json().catch(function(){return{};});
    el.textContent='HTTP:'+r.status+' / '+JSON.stringify(d).slice(0,200);
  }catch(e){
    el.textContent='エラー種別:'+e.name+' / メッセージ:'+e.message;
  }
}
</script>
</body>
</html>
